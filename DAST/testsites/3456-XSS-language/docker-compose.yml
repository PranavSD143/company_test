# Docker Compose configuration
# Type: config
# Language: yaml

version: '3.8'
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_USER=root
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=vulnerable_db
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=vulnerable_db
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

volumes:
  mysql-data: